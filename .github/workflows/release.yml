name: Release

# Publishes a GitHub release whenever the package.json version changes on main.
# HACS uses the release tag as the installed version (instead of the commit SHA),
# and the built card is attached as a release asset.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag & release on version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so we can build the changelog
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Read version from package.json
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether this version is already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.v.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.v.outputs.version }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the card bundle
        if: steps.check.outputs.exists == 'false'
        run: |
          npm ci
          npm run build

      - name: Build changelog notes
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="v${{ steps.v.outputs.version }}"
          PREV="$(git tag --sort=-v:refname | grep -vx "$VERSION" | head -n1 || true)"
          {
            echo "## What's changed"
            echo
            if [ -n "$PREV" ]; then
              git log --no-merges --pretty='- %s (%h)' "${PREV}..HEAD"
              echo
              echo "**Full changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${VERSION}"
            else
              git log --no-merges --pretty='- %s (%h)'
            fi
          } > release-notes.md
          echo "Generated notes:"
          cat release-notes.md

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.v.outputs.version }}" \
            dist/material-thermostat-card.js \
            --target main \
            --title "v${{ steps.v.outputs.version }}" \
            --notes-file release-notes.md
