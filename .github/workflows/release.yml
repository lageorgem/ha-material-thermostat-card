name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    name: Build & attach dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Attach built card to the release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/material-thermostat-card.js
